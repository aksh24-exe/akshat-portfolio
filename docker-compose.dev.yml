version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: portfolio-mongo-dev
    restart: unless-stopped
    ports:
      - "27017:27017"        # Exposed so you can connect with Compass/mongosh
    volumes:
      - mongo_dev_data:/data/db
    networks:
      - portfolio-dev-net

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: portfolio-server-dev
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: development
      MONGODB_URI: mongodb://mongo:27017/akshat-portfolio
      CLIENT_URL: http://localhost:5173
    volumes:
      # Bind-mount source for hot-reload (nodemon watches changes)
      - ./server/src:/app/src
    depends_on:
      - mongo
    networks:
      - portfolio-dev-net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: portfolio-client-dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000
    volumes:
      # Bind-mount source for Vite HMR
      - ./client/src:/app/src
      - ./client/public:/app/public
      # Prevent host node_modules from overriding container's
      - /app/node_modules
    depends_on:
      - server
    networks:
      - portfolio-dev-net

volumes:
  mongo_dev_data:

networks:
  portfolio-dev-net:
    driver: bridge
