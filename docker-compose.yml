version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: portfolio-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - portfolio-net

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: portfolio-server
    restart: unless-stopped
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/akshat-portfolio
      CLIENT_URL: http://localhost
    depends_on:
      - mongo
    networks:
      - portfolio-net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: portfolio-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - portfolio-net

volumes:
  mongo_data:

networks:
  portfolio-net:
    driver: bridge
